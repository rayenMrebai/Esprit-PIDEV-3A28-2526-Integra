# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

parameters:

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # Service de ton ami (UserChecker)
    App\Security\UserChecker:
        tags: ['security.user_checker']

    # Service de ton ami (HuggingFaceService)
    App\Service\HuggingFaceService:
        arguments:
            $apiToken: '%env(HUGGINGFACE_API_TOKEN)%'

    # Ton service HuggingFaceAnalyzer
    App\Service\HuggingFaceAnalyzer:
        arguments:
            $token: '%env(HUGGINGFACE_TOKEN)%'
            $url: '%env(HUGGINGFACE_URL)%'
            $model: '%env(HUGGINGFACE_MODEL)%'

    # Ton contrôleur CVAnalysisController
    App\Controller\CVAnalysisController:
        arguments:
            $mailerFromEmail: '%env(MAILER_FROM_EMAIL)%'