parameters:
    vosk_model_path: '%kernel.project_dir%/vosk-model-small-fr-0.22'

services:
    _defaults:
        autowire: true
        autoconfigure: true
        bind:
            $salaireMailer: '@mailer.salaire'
            $recrutementMailer: '@mailer.recrutement'
            $certificatMailer: '@mailer.certificat'

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # HuggingFace (embedding + matching + conseils RH) – Token unique
    App\Service\HuggingFaceService:
        arguments:
            $HF_TOKEN: '%env(HF_TOKEN)%'

    # Vosk (dictée vocale)
    App\Service\VoskService:
        arguments:
            $modelPath: '%vosk_model_path%'
            $projectDir: '%kernel.project_dir%'
            $logger: '@logger'

    # Ollama (Assistant IA)
    App\Service\OllamaService:
        arguments:
            $ollamaBaseUrl: '%env(OLLAMA_BASE_URL)%'

    # Matching employé-projet
    App\Service\EmployeeMatchingService: ~

    # Taux de change live
    App\Service\CurrencyService: ~

    # Services d'export (Aziz)
    App\Service\ProjectPdfExportService: ~
    App\Service\ProjectExcelExportService: ~

    # Security
    App\Security\UserChecker:
        tags: ['security.user_checker']

    # Analyseur HuggingFace de l'équipe (même token)
    App\Service\HuggingFaceAnalyzer:
        arguments:
            $httpClient: '@http_client'
            $logger: '@logger'
            $token: '%env(HF_TOKEN)%'
            $url: 'https://router.huggingface.co/v1/chat/completions'
            $model: 'meta-llama/Llama-3.1-8B-Instruct:cerebras'

    # Service PDF (bulletin de paie)
    App\Service\PdfService:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # AI Quiz Generator
    App\Service\AIQuizGenerator:
        arguments:
            $apiKey: '%env(GROQ_API_KEY)%'
            $apiUrl: '%env(GROQ_API_URL)%'
            $model: '%env(GROQ_MODEL)%'

    # Mailers
    mailer.transport.salaire:
        class: Symfony\Component\Mailer\Transport\TransportInterface
        factory: ['Symfony\Component\Mailer\Transport', 'fromDsn']
        arguments: ['%env(MAILER_DSN_SALAIRE)%']

    mailer.salaire:
        class: Symfony\Component\Mailer\Mailer
        arguments: ['@mailer.transport.salaire']

    mailer.transport.recrutement:
        class: Symfony\Component\Mailer\Transport\TransportInterface
        factory: ['Symfony\Component\Mailer\Transport', 'fromDsn']
        arguments: ['%env(MAILER_DSN_RECRUTEMENT)%']

    mailer.recrutement:
        class: Symfony\Component\Mailer\Mailer
        arguments: ['@mailer.transport.recrutement']

    mailer.transport.certificat:
        class: Symfony\Component\Mailer\Transport\TransportInterface
        factory: ['Symfony\Component\Mailer\Transport', 'fromDsn']
        arguments: ['%env(MAILER_DSN_CERTIFICAT)%']

    mailer.certificat:
        class: Symfony\Component\Mailer\Mailer
        arguments: ['@mailer.transport.certificat']

    App\Service\EmailSalaireService:
        arguments:
            $salaireMailer: '@mailer.salaire'

    App\Service\EmailService:
        arguments:
            $recrutementMailer: '@mailer.recrutement'

    App\Controller\CVAnalysisController:
        arguments:
            $mailer: '@mailer.recrutement'

    App\Service\CertificatMailer:
        arguments:
            $certificatMailer: '@mailer.certificat'

