# config/services.yaml

parameters:

services:
    _defaults:
        autowire: true
        autoconfigure: true
        # Binding global pour que chaque mailer ait son propre service
        bind:
            $salaireMailer: '@mailer.salaire'
            $recrutementMailer: '@mailer.recrutement'
            $certificatMailer: '@mailer.certificat'

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # ============================================
    # SERVICES DE TON AMI
    # ============================================
    
    App\Security\UserChecker:
        tags: ['security.user_checker']

    App\Service\HuggingFaceService:
        arguments:
            $apiToken: '%env(HUGGINGFACE_API_TOKEN)%'

    # ============================================
    # TES SERVICES
    # ============================================
    
    App\Service\HuggingFaceAnalyzer:
        arguments:
            $token: '%env(HUGGINGFACE_TOKEN)%'
            $url: '%env(HUGGINGFACE_URL)%'
            $model: '%env(HUGGINGFACE_MODEL)%'

    App\Service\PdfService:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Service\AIQuizGenerator:
        arguments:
            $apiKey: '%env(GROQ_API_KEY)%'
            $apiUrl: '%env(GROQ_API_URL)%'
            $model: '%env(GROQ_MODEL)%'

    # ============================================
    # MAILER SALAIRE (Toi - Brevo)
    # ============================================
    
    mailer.transport.salaire:
        class: Symfony\Component\Mailer\Transport\TransportInterface
        factory: ['Symfony\Component\Mailer\Transport', 'fromDsn']
        arguments: ['%env(MAILER_DSN_SALAIRE)%']

    mailer.salaire:
        class: Symfony\Component\Mailer\Mailer
        arguments:
            - '@mailer.transport.salaire'

    # ============================================
    # MAILER RECRUTEMENT (Ami - Gmail)
    # ============================================
    
    mailer.transport.recrutement:
        class: Symfony\Component\Mailer\Transport\TransportInterface
        factory: ['Symfony\Component\Mailer\Transport', 'fromDsn']
        arguments: ['%env(MAILER_DSN_RECRUTEMENT)%']

    mailer.recrutement:
        class: Symfony\Component\Mailer\Mailer
        arguments:
            - '@mailer.transport.recrutement'

    # ============================================
    # MAILER CERTIFICAT (Sarabeji - Gmail)
    # ============================================
    
    mailer.transport.certificat:
        class: Symfony\Component\Mailer\Transport\TransportInterface
        factory: ['Symfony\Component\Mailer\Transport', 'fromDsn']
        arguments: ['%env(MAILER_DSN_CERTIFICAT)%']

    mailer.certificat:
        class: Symfony\Component\Mailer\Mailer
        arguments:
            - '@mailer.transport.certificat'

    # ============================================
    # INJECTION EXPLICITE DES MAILERS DANS LES SERVICES
    # ============================================
    
    App\Service\EmailSalaireService:
        arguments:
            $salaireMailer: '@mailer.salaire'

    App\Service\EmailService:
        arguments:
            $recrutementMailer: '@mailer.recrutement'

    App\Controller\CVAnalysisController:
        arguments:
            $mailer: '@mailer.recrutement'

    App\Service\CertificatMailer:
        arguments:
            $certificatMailer: '@mailer.certificat'