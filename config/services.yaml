# config/services.yaml
parameters:

services:
    # Configuration par défaut pour tous les services de src/
    _defaults:
        autowire: true
        autoconfigure: true

    # Déclaration des services de l'application
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # Service HuggingFace avec injection du token
    App\Service\HuggingFaceService:
        arguments:
            $hfToken: '%env(HF_TOKEN)%'

    # Ajoutez ici d'autres services personnalisés si nécessaire