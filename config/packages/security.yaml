security:
    password_hashers:
        App\Entity\UserAccount: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\UserAccount
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
            
        main:
            lazy: true
            provider: app_user_provider
            # SUPPRIMEZ form_login, utilisez uniquement votre custom authenticator
            custom_authenticator: App\Security\LoginFormAuthenticator
            logout:
                path: app_logout
                target: app_login

    access_control:
        - { path: ^/login$, roles: PUBLIC_ACCESS }
        - { path: ^/register$, roles: PUBLIC_ACCESS }
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/dashboard, roles: ROLE_MANAGER }
        - { path: ^/dashboard, roles: ROLE_EMPLOYE }