security:
    password_hashers:
        App\Entity\UserAccount: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\UserAccount
                property: username

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            custom_authenticator: App\Security\LoginFormAuthenticator
            logout:
                path: app_logout
                target: front_home              # ← redirection après déconnexion vers l'accueil front
            # remember_me removed as requested

    role_hierarchy:
        ROLE_ADMIN: [ROLE_MANAGER]
        ROLE_MANAGER: [ROLE_USER]

    access_control:
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/recruitment, roles: ROLE_MANAGER }   # protège ton dashboard
        - { path: ^/admin, roles: ROLE_MANAGER }
        - { path: ^/profile, roles: ROLE_USER }
        # Les autres routes (dont /) sont accessibles à tous par défaut